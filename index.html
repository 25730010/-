<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE DEAD : ADVANCED MAZE SYSTEM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;700&family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap');

        :root {
            --neon-pink: #FF007F;
            --neon-blue: #4374D9;
            --toxic-green: #00FF88;
            --neon-red: #F15F5F;
            --bg-black: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background: var(--bg-black); color: #fff; font-family: 'IBM Plex Sans KR', sans-serif; height: 100vh; overflow: hidden; }

        /* --- 비주얼 캔버스 --- */
        .visual-stage {
            width: 100%; height: 100%; position: relative;
            background: radial-gradient(circle, #1a0b2e 0%, #000 100%);
            display: flex; justify-content: center; align-items: center;
        }

        /* 디테일 미로(Maze) 시스템 */
        .maze-board {
            width: 450px; height: 450px;
            display: grid; grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            border: 4px solid var(--neon-pink);
            background: rgba(0,0,0,0.9);
            position: relative; z-index: 10;
            box-shadow: 0 0 40px rgba(255, 0, 127, 0.4);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .maze-cell { border: 1px solid rgba(255, 255, 255, 0.03); }
        .wall { 
            background: linear-gradient(135deg, var(--neon-blue), #1a0b2e); 
            box-shadow: inset 0 0 10px var(--neon-blue), 0 0 5px var(--neon-blue);
        }
        .path { background: rgba(255, 255, 255, 0.02); }
        .player {
            width: 70%; height: 70%; background: var(--toxic-green); 
            border-radius: 2px; position: absolute; margin: 15%;
            box-shadow: 0 0 20px var(--toxic-green), 0 0 40px var(--toxic-green);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* 번개 및 거미줄 */
        .lightning { position: fixed; inset: 0; background: #fff; opacity: 0; z-index: 1000; pointer-events: none; }
        .flash { animation: flash-anim 0.4s ease-out; }
        @keyframes flash-anim { 0% { opacity: 0.8; } 100% { opacity: 0; } }

        /* --- UI 레이아웃 --- */
        header {
            padding: 20px 40px; border-bottom: 2px solid var(--neon-pink);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.9); z-index: 500; position: relative;
        }
        .main-container { display: grid; grid-template-columns: 1fr 480px; height: calc(100vh - 80px); }

        .content-panel { 
            padding: 40px; display: flex; flex-direction: column; gap: 20px; 
            background: rgba(5, 5, 5, 0.95); border-left: 2px solid var(--neon-pink);
        }
        .scene-header { border-bottom: 1px solid var(--neon-blue); padding-bottom: 10px; }
        .scene-id { font-family: 'Orbitron'; color: var(--neon-pink); font-size: 1.5rem; letter-spacing: 3px; }
        .narrative { font-size: 1.05rem; line-height: 1.8; color: #ccc; min-height: 180px; }

        /* --- 4대 지표 대시보드 --- */
        .stat-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 2px;
            border-left: 3px solid var(--toxic-green);
        }
        .stat-label { font-family: 'Share Tech Mono'; font-size: 10px; color: #888; display: block; }
        .stat-num { font-family: 'Orbitron'; font-size: 1.2rem; color: #fff; }

        .choice-btn {
            padding: 15px; background: transparent; border: 1px solid var(--neon-blue);
            color: #fff; font-family: 'Orbitron'; font-size: 0.9rem; cursor: pointer;
            text-align: left; transition: 0.3s; margin-bottom: 8px;
        }
        .choice-btn:hover { background: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue); padding-left: 25px; }

        /* --- Cover & Ending --- */
        #cover { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .cover-title { font-family: 'Orbitron'; font-size: 5rem; color: var(--neon-pink); text-shadow: 0 0 30px var(--neon-pink); }
        #ending { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; border: 10px double var(--toxic-green); }
    </style>
</head>
<body>

<div id="lightning" class="lightning"></div>

<div id="cover">
    <div style="font-family: 'Share Tech Mono'; color: var(--toxic-green); margin-bottom: 20px;">AUTHOR: 25730010 | 조한나</div>
    <h1 class="cover-title">CODE DEAD</h1>
    <button class="choice-btn" style="text-align:center; padding: 20px 80px; margin-top: 30px;" onclick="startGame()">▶ SYSTEM ACCESS</button>
</div>

<div id="ending">
    <h2 id="end-title" style="font-family:'Orbitron'; font-size: 3rem;"></h2>
    <p id="end-msg" style="margin: 20px 0; font-size: 1.2rem;"></p>
    <button class="choice-btn" onclick="location.reload()">REBOOT</button>
</div>

<header>
    <div style="font-family:'Orbitron'; font-weight:900; color: var(--neon-pink); letter-spacing: 5px;">CODE DEAD // PROJECT</div>
    <div style="font-family:'Share Tech Mono'; color: var(--toxic-green);">SECURITY_LEVEL: OMEGA</div>
</header>

<main class="main-container">
    <div class="visual-stage">
        <div id="maze-board" class="maze-board"></div>
    </div>

    <div class="content-panel">
        <div class="scene-header">
            <div class="scene-id" id="ui-id">S1</div>
            <div style="font-size: 12px; color: var(--neon-blue); font-family: 'Share Tech Mono';">LOCATION: DATA_SLUM_01</div>
        </div>
        <p class="narrative" id="ui-text"></p>
        
        <div id="btn-area" style="display:flex; flex-direction:column;"></div>

        <div class="stat-grid">
            <div class="stat-card" style="border-color: var(--toxic-green);"><span class="stat-label">SYNC (동기화)</span><div class="stat-num" id="st-sync">100</div></div>
            <div class="stat-card" style="border-color: var(--neon-blue);"><span class="stat-label">CRED (신뢰도)</span><div class="stat-num" id="st-cred">0</div></div>
            <div class="stat-card" style="border-color: var(--neon-pink);"><span class="stat-label">INTEG (무결성)</span><div class="stat-num" id="st-integ">0</div></div>
            <div class="stat-card" style="border-color: var(--neon-red);"><span class="stat-label">NOISE (발각도)</span><div class="stat-num" id="st-noise">0</div></div>
        </div>
    </div>
</main>

<script>
    let state = { sync: 100, cred: 0, integ: 0, noise: 0, current: 'S1' };

    const scenario = {
        S1: { id: 'S1', text: 'ID 태그가 독성 핑크빛으로 타오르며 점멸합니다. 누군가 당신의 원본 로그를 삭제하고 있습니다. 미로의 미궁을 뚫고 데이터를 확보하십시오.', 
              choices: [
                { t: '시스템 강제 우회', next: 'S3', s: 10, c: 0, i: 5, n: 20 },
                { t: '은신 프로토콜 가동', next: 'S3', s: -5, c: 5, i: 15, n: -10 }
              ] 
        },
        S3: { id: 'S3', text: '오라클이 폐서버 랙 사이에서 기판을 씹으며 묻습니다. "남의 로그를 약탈해서라도 이 미로를 나갈 텐가, 아니면 여기서 삭제될 텐가?"', 
              choices: [
                { t: '데이터 칩 약탈', next: 'S4', s: 20, c: -10, i: -20, n: 10 },
                { t: '순수 로그 유지', next: 'S4', s: -15, c: 20, i: 20, n: 0 }
              ] 
        },
        S4: { id: 'S4', text: '선녀의 방입니다. 그녀의 기계 날개가 미로를 차단합니다. "당신의 신뢰도가 이 문을 열 열쇠가 될 것입니다."', 
              choices: [
                { t: '무결성 증명', next: 'S5', s: 5, c: 15, i: 15, n: 0 },
                { t: '강제 권한 탈취', next: 'S5', s: 15, c: -20, i: -10, n: 30 }
              ] 
        },
        S5: { id: 'S5', text: '마지막 코어 앞, 보안 AI PZ(팥쥐)가 번개처럼 나타납니다. 모든 지표가 임계점에 도달했습니다. 결정을 내리십시오.', 
              choices: [
                { t: '최종 동기화 실행', action: () => checkEnd() }
              ] 
        }
    };

    function drawMaze() {
        const board = document.getElementById('maze-board');
        board.innerHTML = '';
        const size = 15;
        board.style.transform = `rotate(${Math.random() * 10 - 5}deg) scale(${1 + (state.noise * 0.002)})`;

        for (let i = 0; i < size * size; i++) {
            const cell = document.createElement('div');
            cell.className = 'maze-cell';
            // 노이즈 수치에 따라 미로 벽 생성 확률 증가
            const wallProb = 0.6 + (state.noise * 0.001);
            if (Math.random() > wallProb) {
                cell.classList.add('wall');
            } else {
                cell.classList.add('path');
            }
            if (i === Math.floor(Math.random() * size * size)) {
                const p = document.createElement('div');
                p.className = 'player';
                cell.appendChild(p);
            }
            board.appendChild(cell);
        }
    }

    function triggerLightning() {
        const ln = document.getElementById('lightning');
        ln.classList.remove('flash');
        void ln.offsetWidth;
        ln.classList.add('flash');
    }

    function startGame() {
        document.getElementById('cover').style.display = 'none';
        updateUI('S1');
    }

    function updateUI(sid) {
        const s = scenario[sid];
        triggerLightning();
        drawMaze();

        document.getElementById('ui-id').innerText = s.id;
        document.getElementById('ui-text').innerText = s.text;
        document.getElementById('st-sync').innerText = state.sync;
        document.getElementById('st-cred').innerText = state.cred;
        document.getElementById('st-integ').innerText = state.integ;
        document.getElementById('st-noise').innerText = state.noise;

        const area = document.getElementById('btn-area');
        area.innerHTML = '';
        s.choices.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = c.t;
            btn.onclick = () => {
                state.sync += c.s || 0;
                state.cred += c.c || 0;
                state.integ += c.i || 0;
                state.noise += c.n || 0;
                if (c.action) c.action();
                else updateUI(c.next);
            };
            area.appendChild(btn);
        });
    }

    function checkEnd() {
        const end = document.getElementById('ending');
        const title = document.getElementById('end-title');
        const msg = document.getElementById('end-msg');
        end.style.display = 'flex';

        const finalScore = (state.sync * 0.5) + (state.cred * 0.5) - (state.noise * 0.2);
        if (finalScore >= 60) {
            title.innerText = "SUCCESS: RECOVERY";
            title.style.color = "var(--toxic-green)";
            msg.innerText = `조한나 님, 정체성 복구 성공. 판정 지수: ${finalScore.toFixed(1)}`;
        } else {
            title.innerText = "FAILURE: ERASED";
            title.style.color = "var(--neon-red)";
            msg.innerText = `데이터 소거 완료. 판정 지수: ${finalScore.toFixed(1)}`;
        }
    }

    window.onload = drawMaze;
</script>
</body>
</html>
